<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbiton — Login</title>
  <meta name="description" content="Orbiton — Universal App & Server Manager" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060612; --border: rgba(255,255,255,0.08);
      --accent: #7c3aed; --accent2: #3b82f6;
      --text: #f1f5f9; --muted: #94a3b8;
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg);
      color: var(--text); min-height: 100vh;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .bg-blobs { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .blob { position: absolute; border-radius: 50%; filter: blur(110px); opacity: 0.12; animation: float 9s ease-in-out infinite; }
    .blob-1 { width: 700px; height: 700px; top: -250px; left: -200px; background: radial-gradient(circle,#7c3aed,transparent); }
    .blob-2 { width: 600px; height: 600px; bottom: -200px; right: -200px; background: radial-gradient(circle,#3b82f6,transparent); animation-delay:-4s; }
    .blob-3 { width: 450px; height: 450px; top:50%; left:50%; transform:translate(-50%,-50%); background: radial-gradient(circle,#a855f7,transparent); animation-delay:-8s; }
    @keyframes float { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-25px) scale(1.04);} }
    .blob-3 { animation: float3 11s ease-in-out infinite; }
    @keyframes float3 { 0%,100%{transform:translate(-50%,-50%) scale(1);} 50%{transform:translate(-50%,-50%) scale(1.08);} }
    body::before {
      content:''; position:fixed; inset:0; z-index:0;
      background-image: linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px), linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px);
      background-size: 44px 44px; pointer-events:none;
    }
    .login-wrap { position:relative; z-index:10; width:100%; max-width:440px; padding:16px; }
    .login-card {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 24px; padding: 48px 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
      animation: slideUp 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(40px) scale(0.95);} to{opacity:1;transform:none;} }
    .logo { display:flex; align-items:center; gap:14px; justify-content:center; margin-bottom:32px; }
    .logo-icon {
      width:52px; height:52px; border-radius:16px;
      background: linear-gradient(135deg,#7c3aed,#3b82f6);
      display:flex; align-items:center; justify-content:center; font-size:26px;
      box-shadow: 0 8px 28px rgba(124,58,237,0.4);
    }
    .logo-text { font-size:26px; font-weight:800; letter-spacing:-1px; }
    .logo-sub  { font-size:10px; color:var(--muted); letter-spacing:2.5px; text-transform:uppercase; margin-top:2px; }
    h1 { font-size:24px; font-weight:700; text-align:center; margin-bottom:6px; letter-spacing:-0.5px; }
    .subtitle { text-align:center; color:var(--muted); font-size:14px; margin-bottom:36px; }
    .form-group { margin-bottom:18px; }
    label { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:7px; letter-spacing:0.5px; text-transform:uppercase; }
    .input-wrap { position:relative; }
    .input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:15px; pointer-events:none; }
    input[type="text"], input[type="password"] {
      width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--border);
      border-radius:12px; padding:13px 14px 13px 44px;
      color:var(--text); font-family:'Inter',sans-serif; font-size:15px; outline:none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    input:focus { border-color:var(--accent); background:rgba(124,58,237,0.05); box-shadow:0 0 0 3px rgba(124,58,237,0.15); }
    input::placeholder { color:rgba(148,163,184,0.4); }
    .btn-login {
      width:100%; padding:15px; background:linear-gradient(135deg,#7c3aed,#3b82f6);
      border:none; border-radius:12px; color:#fff; font-family:'Inter',sans-serif;
      font-size:16px; font-weight:600; cursor:pointer; margin-top:8px;
      box-shadow:0 8px 24px rgba(124,58,237,0.35);
      position:relative; overflow:hidden; transition:box-shadow .2s, transform .15s;
    }
    .btn-login::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent); opacity:0; transition:opacity .2s; }
    .btn-login:hover::before { opacity:1; }
    .btn-login:hover { box-shadow:0 12px 32px rgba(124,58,237,0.5); transform:translateY(-1px); }
    .btn-login:active { transform:translateY(0); }
    .btn-login:disabled { opacity:.6; cursor:not-allowed; transform:none; }
    .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:8px; }
    @keyframes spin { to{transform:rotate(360deg);} }
    .error-msg { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:10px; padding:12px 16px; color:#fca5a5; font-size:14px; margin-top:14px; display:none; align-items:center; gap:8px; }
    .error-msg.show { display:flex; animation:fadeIn .3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-4px);} to{opacity:1;} }
    .footer { text-align:center; margin-top:30px; color:var(--muted); font-size:12px; line-height:1.9; }
    .footer span { color:var(--accent); font-weight:600; }
    .particles { position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
    .particle { position:absolute; width:2px; height:2px; background:rgba(124,58,237,0.5); border-radius:50%; animation:drift linear infinite; }
    @keyframes drift { 0%{transform:translateY(100vh);opacity:0;} 10%{opacity:1;} 90%{opacity:1;} 100%{transform:translateY(-100px) translateX(80px);opacity:0;} }
  </style>
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
  <div class="particles" id="particles"></div>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">🌐</div>
        <div>
          <div class="logo-text">Orbiton</div>
          <div class="logo-sub">App Manager</div>
        </div>
      </div>
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to manage your apps & servers</p>
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="username" name="username" placeholder="Enter username" autofocus autocomplete="username" />
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" />
          </div>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
        <div class="error-msg" id="errorMsg">
          <span>⚠️</span><span id="errorText">Invalid credentials</span>
        </div>
      </form>
      <div class="footer">
        Orbiton • Universal App &amp; Server Manager<br/>
        Default: <span>admin</span> / <span>admin123</span>
      </div>
    </div>
  </div>
  <script>
    const container = document.getElementById('particles');
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div'); p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (9 + Math.random() * 12) + 's';
      p.style.animationDelay = (-Math.random() * 22) + 's';
      container.appendChild(p);
    }
    if (localStorage.getItem('orbiton_token')) window.location.href = '/dashboard';

    const form = document.getElementById('loginForm');
    const btn  = document.getElementById('loginBtn');
    const err  = document.getElementById('errorMsg');
    let isSetupMode = false;

    // Check setup status
    async function checkSetup() {
      try {
        const res = await fetch('/api/auth/setup-status');
        const data = await res.json();
        if (data.needsSetup) {
          isSetupMode = true;
          document.querySelector('h1').textContent = 'First-time Setup';
          document.querySelector('.subtitle').textContent = 'Create your administrator account';
          btn.textContent = 'Complete Setup';
          
          // Add Skip button
          const skipDiv = document.createElement('div');
          skipDiv.style.textAlign = 'center';
          skipDiv.style.marginTop = '16px';
          skipDiv.innerHTML = `<a href="#" id="btnSkipSetup" style="font-size:13px;color:var(--accent);font-weight:500;text-decoration:underline">Skip & use default (admin / admin123)</a>`;
          form.appendChild(skipDiv);

          document.getElementById('btnSkipSetup').addEventListener('click', async (e) => {
            e.preventDefault();
            await runSetup('admin', 'admin123');
          });
        }
      } catch (_) {}
    }
    checkSetup();

    async function runSetup(username, password) {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Setting up...';
      try {
        const res = await fetch('/api/auth/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) {
          document.getElementById('errorText').textContent = data.error || 'Setup failed';
          err.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Complete Setup';
          return;
        }
        
        // Success! Reload page to show login form
        alert('Setup complete! You can now log in.');
        window.location.reload();
      } catch (_) {
        document.getElementById('errorText').textContent = 'Setup connection failed';
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Complete Setup';
      }
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      err.classList.remove('show');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) {
        document.getElementById('errorText').textContent = 'Please enter username and password';
        err.classList.add('show'); return;
      }

      if (isSetupMode) {
        await runSetup(username, password);
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in...';
      try {
        const res  = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (!res.ok) {
          document.getElementById('errorText').textContent = data.error || 'Login failed';
          err.classList.add('show');
          btn.disabled = false; btn.textContent = 'Sign In'; return;
        }
        localStorage.setItem('orbiton_token', data.token);
        localStorage.setItem('orbiton_user',  JSON.stringify(data.user));
        btn.innerHTML = '✓ Redirecting...';
        setTimeout(() => window.location.href = '/dashboard', 350);
      } catch {
        document.getElementById('errorText').textContent = 'Cannot connect to server';
        err.classList.add('show');
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
