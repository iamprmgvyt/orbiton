<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Base Background -->
  <rect width="100" height="100" rx="24" fill="#0d0e12" />
  <!-- Neon Orbit circle -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="url(#purpleGrad)" stroke-width="6" stroke-dasharray="140 40" filter="url(#neonGlow)" />
  <!-- Center Core -->
  <circle cx="50" cy="50" r="16" fill="url(#purpleGrad)" filter="url(#neonGlow)" />
  <circle cx="50" cy="50" r="8" fill="#ffffff" />
</svg>